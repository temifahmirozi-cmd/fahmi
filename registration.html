<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        #registration-card {
            display: none;
            margin-top: 20px;
            background: #e2ffcc;
            padding: 10px;
            border-radius: 5px;
        }
        @media (max-width: 600px) {
            form {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h2>Registration Form for Calon Mahasiswa</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" required>
            <div id="namaError" class="error"></div>
        </div>
        <div class="form-group">
            <label for="ttl">TTL (Place and Date of Birth):</label>
            <input type="text" id="ttl" required>
            <div id="ttlError" class="error"></div>
        </div>
        <div class="form-group">
            <label for="telp">Telepon:</label>
            <input type="tel" id="telp" required pattern="\d{10,13}">
            <div id="telpError" class="error"></div>
        </div>
        <div class="form-group">
            <label for="sekolah">Sekolah:</label>
            <input type="text" id="sekolah" required>
            <div id="sekolahError" class="error"></div>
        </div>
        <button type="submit">Submit</button>
    </form>

    <div id="registration-card">
        <h3>Registration Card</h3>
        <p>ID: <span id="uniqueID"></span></p>
        <p>Nama: <span id="cardName"></span></p>
        <p>TTL: <span id="cardTTL"></span></p>
        <p>Sekolah: <span id="cardSekolah"></span></p>
        <canvas id="barcode"></canvas>
        <button onclick="printCard()">Print</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script>
        document.getElementById('registrationForm').onsubmit = function(event) {
            event.preventDefault();

            const nama = document.getElementById('nama').value;
            const ttl = document.getElementById('ttl').value;
            const telp = document.getElementById('telp').value;
            const sekolah = document.getElementById('sekolah').value;

            // Validation Logic
            let valid = true;
            if (!nama) { document.getElementById('namaError').innerText = 'Nama is required'; valid = false; }
            if (!ttl) { document.getElementById('ttlError').innerText = 'TTL is required'; valid = false; }
            if (!telp.match(/^\d{10,13}$/)) { document.getElementById('telpError').innerText = 'Phone number must be 10-13 digits'; valid = false; }
            if (!sekolah) { document.getElementById('sekolahError').innerText = 'Sekolah is required'; valid = false; }

            if (!valid) return;

            document.getElementById('namaError').innerText = '';
            document.getElementById('ttlError').innerText = '';
            document.getElementById('telpError').innerText = '';
            document.getElementById('sekolahError').innerText = '';

            // Generate Unique ID
            const uniqueID = `UTA45-${Date.now()}`;
            document.getElementById('uniqueID').innerText = uniqueID;
            document.getElementById('cardName').innerText = nama;
            document.getElementById('cardTTL').innerText = ttl;
            document.getElementById('cardSekolah').innerText = sekolah;

            // Generate Barcode
            JsBarcode("#barcode", uniqueID);

            // Display Registration Card
            document.getElementById('registration-card').style.display = 'block';

            // Send data to Google Apps Script (add your URL)
            fetch('YOUR_GOOGLE_APPS_SCRIPT_URL', {
                method: 'POST',
                body: JSON.stringify({ nama, ttl, telp, sekolah, uniqueID }),
                headers: { 'Content-Type': 'application/json' }
            }).catch(err => console.error('Error:', err));
        };

        function printCard() {
            window.print();
        }
    </script>
</body>
</html>
